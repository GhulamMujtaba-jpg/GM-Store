<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GM Store Pro</title>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <style>

        body{
        font-family:Arial;
        margin:0;
        background:linear-gradient(135deg,#6dd5ed,#2193b0,#cc2b5e,#753a88);
        background-size:400% 400%;
        animation:bgMove 10s infinite alternate;
        }

        @keyframes bgMove{
        0%{background-position:left}
        100%{background-position:right}
        }

        header{
        background:#2c3e50;
        color:white;
        padding:15px;
        display:flex;
        justify-content:space-between;
        align-items:center;
        }

        .container{
        max-width:1100px;
        margin:auto;
        padding:20px;
        }

        button{
        padding:6px 10px;
        border:none;
        border-radius:6px;
        cursor:pointer;
        background:#27ae60;
        color:white;
        margin:3px;
        font-size:14px;
        }

        input,textarea,select{
        width:100%;
        padding:6px;
        margin:6px 0;
        border-radius:6px;
        border:none;
        }

        .products{
        display:grid;
        grid-template-columns:repeat(auto-fill,minmax(180px,1fr));
        gap:12px;
        margin-top:20px;
        }

        .card{
        background:white;
        padding:8px;
        border-radius:10px;
        box-shadow:0 3px 8px rgba(0,0,0,.3);
        text-align:center;
        font-size:14px;
        }

        .card img{
        width:100%;
        height:120px;
        object-fit:cover;
        border-radius:6px;
        }

        .price{
        color:#27ae60;
        font-weight:bold;
        font-size:14px;
        }

        .old{
        color:red;
        text-decoration:line-through;
        font-size:12px;
        }

        .discount{
        color:#e67e22;
        font-weight:bold;
        font-size:12px;
        }

        .categoryBlocks{
        display:grid;
        grid-template-columns:repeat(auto-fill,minmax(100px,1fr));
        gap:10px;
        margin-bottom:20px;
        }

        .cat{
        background:white;
        padding:8px;
        border-radius:8px;
        text-align:center;
        cursor:pointer;
        font-size:12px;
        }

        .cat img{
        width:50px;
        height:50px;
        border-radius:50%;
        object-fit:cover;
        }

        .searchBar{
        width:200px;
        padding:6px;
        border-radius:6px;
        border:none;
        font-size:14px;
        }

    </style>
</head>

<body>

<header>

    <h2>GM Store Pro</h2>

    <input class="searchBar"
           placeholder="Search product..."
           onkeyup="searchProduct(this.value)">

</header>

<div class="container">

    <h2>Categories</h2>

    <div id="categoryBlocks" class="categoryBlocks"></div>


    <h2>Admin Login</h2>

    <input id="adminUser" placeholder="Username">
    <input id="adminPass" type="password" placeholder="Password">

    <button onclick="adminLogin()">Login</button>


    <div id="adminDashboard" style="display:none">

        <h2>Add / Edit Product</h2>

        <input id="pname" placeholder="Product Name">

        <textarea id="description"
                  placeholder="Description"></textarea>

        <input id="price" type="number" placeholder="Price">

        <input id="discount" type="number" placeholder="Discount %">

        <input id="stock" type="number" placeholder="Stock">

        <input id="whatsapp" placeholder="WhatsApp Number">

        <select id="categorySelect"></select>

        <h3>Product Images (Max 5)</h3>

        <input type="file" id="images" multiple>

        <button onclick="addProduct()">Add Product</button>

        <button onclick="updateProduct()">Update Product</button>


        <h2>Create Category</h2>

        <input id="newCategoryName"
               placeholder="Category Name">

        <input type="file"
               id="newCategoryImage">

        <button onclick="addCategory()">Add Category</button>

    </div>


    <h2>Products</h2>

    <div id="productList" class="products"></div>

</div>


<script>

    let products = JSON.parse(localStorage.getItem("products")) || [];
    let categories = JSON.parse(localStorage.getItem("categories")) || {};
    let editIndex = null;

    function save(){
    localStorage.setItem("products",JSON.stringify(products));
    localStorage.setItem("categories",JSON.stringify(categories));
    renderCategoryBlocks();
    renderCategorySelect();
    }

    function adminLogin(){
    let u=document.getElementById("adminUser").value;
    let p=document.getElementById("adminPass").value;

    if(u=="admin" && p=="admin"){
    document.getElementById("adminDashboard").style.display="block";
    Swal.fire("Welcome Admin");
    renderCategoryBlocks();
    renderCategorySelect();
    }else{
    Swal.fire("Wrong Login");
    }
    }

    function renderCategoryBlocks(){
    let box=document.getElementById("categoryBlocks");
    box.innerHTML="";
    for(let c in categories){
    let div=document.createElement("div");
    div.className="cat";
    div.innerHTML=`<img src="${categories[c]}"><br><b>${c}</b>`;
    div.onclick=function(){filterCategory(c);};
    box.appendChild(div);
    }
    }

    function renderCategorySelect(){
    let sel=document.getElementById("categorySelect");
    sel.innerHTML="<option value=''>Select Category</option>";
    for(let c in categories){
    sel.innerHTML+=`<option value="${c}">${c}</option>`;
    }
    }

    function addCategory(){
    let name=document.getElementById("newCategoryName").value.trim();
    let file=document.getElementById("newCategoryImage").files[0];

    if(!name){Swal.fire("Enter Category Name");return;}
    if(categories[name]){Swal.fire("Category exists");return;}

    if(file){
    let reader=new FileReader();
    reader.onload=function(e){
    categories[name]=e.target.result;
    save();
    Swal.fire("Category Added");
    };
    reader.readAsDataURL(file);
    }else{
    categories[name]="https://cdn-icons-png.flaticon.com/512/263/263142.png";
    save();
    Swal.fire("Category Added");
    }

    document.getElementById("newCategoryName").value="";
    document.getElementById("newCategoryImage").value="";
    }

    function addProduct(){
    let name=document.getElementById("pname").value.trim();
    let desc=document.getElementById("description").value.trim();
    let price=document.getElementById("price").value;
    let discount=document.getElementById("discount").value||0;
    let stock=document.getElementById("stock").value;
    let whatsapp=document.getElementById("whatsapp").value;
    let cat=document.getElementById("categorySelect").value;

    if(!name||!desc||!price||!stock||!whatsapp||!cat){
    Swal.fire("Fill all fields");
    return;
    }

    let files=document.getElementById("images").files;
    let imgs=[];

    if(files.length==0){
    imgs.push("https://via.placeholder.com/300x200?text=No+Image");
    }else{
    for(let i=0;i<files.length;i++){
    imgs.push(URL.createObjectURL(files[i]));
    }
    }

    products.push({
    name:name,
    description:desc,
    price:price,
    discount:discount,
    stock:stock,
    whatsapp:whatsapp,
    category:cat,
    images:imgs,
    imgIndex:0
    });

    save();
    renderProducts();
    clearForm();
    Swal.fire("Product Added");
    }

    function renderProducts(){
    let box=document.getElementById("productList");
    box.innerHTML="";

    products.forEach((p,i)=>{
    let final=(p.price-(p.price*p.discount/100)).toFixed(0);

    let card=document.createElement("div");
    card.className="card";

    card.innerHTML=`
    <img src="${p.images[0]}">
    <h3>${p.name}</h3>
    <div class="old">PKR ${p.price}</div>
    <div class="discount">Discount ${p.discount}%</div>
    <div class="price">Final PKR ${final}</div>
    <div>Stock ${p.stock}</div>
    <button onclick="viewProduct(${i})">View</button>
    <button onclick="editProduct(${i})">Edit</button>
    <button onclick="orderProduct(${i})">Order</button>
    <button onclick="deleteProduct(${i})" style="background:red">Delete</button>
    `;

    box.appendChild(card);
    });
    }

    function editProduct(i){
    let p=products[i];
    document.getElementById("pname").value=p.name;
    document.getElementById("description").value=p.description;
    document.getElementById("price").value=p.price;
    document.getElementById("discount").value=p.discount;
    document.getElementById("stock").value=p.stock;
    document.getElementById("whatsapp").value=p.whatsapp;
    document.getElementById("categorySelect").value=p.category;
    editIndex=i;
    Swal.fire("Product ready for edit");
    }

    function updateProduct(){
    if(editIndex==null)return;
    let p=products[editIndex];
    p.name=document.getElementById("pname").value;
    p.description=document.getElementById("description").value;
    p.price=document.getElementById("price").value;
    p.discount=document.getElementById("discount").value;
    p.stock=document.getElementById("stock").value;
    p.whatsapp=document.getElementById("whatsapp").value;
    p.category=document.getElementById("categorySelect").value;

    save();
    renderProducts();
    Swal.fire("Product Updated");
    }

    function deleteProduct(i){
    products.splice(i,1);
    save();
    renderProducts();
    }

    function orderProduct(i){
    let p=products[i];
    let final=(p.price-(p.price*p.discount/100)).toFixed(0);
    window.open(`https://wa.me/${p.whatsapp}?text=I want to order ${p.name} for PKR ${final}`);
    }

    function viewProduct(i){
    let p=products[i];
    let final=(p.price-(p.price*p.discount/100)).toFixed(0);
    let imgsHtml=p.images.map(img=>`<img src="${img}" width="200" style="margin:5px;border-radius:6px">`).join('');
    Swal.fire({
    title: `<b>${p.name}</b>`,
    html: `
    ${imgsHtml}<br>
    <p>${p.description}</p>
    <p>Original Price: <span class="old">PKR ${p.price}</span></p>
    <p>Discount: <span class="discount">${p.discount}%</span></p>
    <p>Final Price: <span class="price">PKR ${final}</span></p>
    <p>Stock: ${p.stock}</p>
    <button onclick="window.open('https://wa.me/${p.whatsapp}?text=I want to order ${p.name} for PKR ${final}')">Order via WhatsApp</button>
    `,
    width:400,
    showConfirmButton:false
    });
    }

    function filterCategory(cat){
    let box=document.getElementById("productList");
    box.innerHTML="";
    products.forEach((p,i)=>{
    if(p.category==cat){
    let final=(p.price-(p.price*p.discount/100)).toFixed(0);
    let card=document.createElement("div");
    card.className="card";
    card.innerHTML=`
    <img src="${p.images[0]}">
    <h3>${p.name}</h3>
    <div class="price">PKR ${final}</div>
    <button onclick="viewProduct(${i})">View</button>
    <button onclick="orderProduct(${i})">Order</button>
    `;
    box.appendChild(card);
    }
    });
    }

    function searchProduct(text){
    text=text.toLowerCase();
    let box=document.getElementById("productList");
    box.innerHTML="";
    products.forEach((p,i)=>{
    if(p.name.toLowerCase().includes(text)){
    let final=(p.price-(p.price*p.discount/100)).toFixed(0);
    let card=document.createElement("div");
    card.className="card";
    card.innerHTML=`
    <img src="${p.images[0]}">
    <h3>${p.name}</h3>
    <div class="price">PKR ${final}</div>
    <button onclick="viewProduct(${i})">View</button>
    <button onclick="orderProduct(${i})">Order</button>
    `;
    box.appendChild(card);
    }
    });
    }

    function clearForm(){
    document.getElementById("pname").value="";
    document.getElementById("description").value="";
    document.getElementById("price").value="";
    document.getElementById("discount").value="";
    document.getElementById("stock").value="";
    document.getElementById("whatsapp").value="";
    document.getElementById("images").value="";
    document.getElementById("categorySelect").value="";
    }

    renderProducts();
    renderCategoryBlocks();
    renderCategorySelect();

</script>

</body>
</html>
