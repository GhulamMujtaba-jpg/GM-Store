<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GM Store - Client View</title>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

<style>
body{font-family:Arial;margin:0;background:linear-gradient(135deg,#6dd5ed,#2193b0,#cc2b5e,#753a88);background-size:400% 400%;animation:bgMove 10s infinite alternate;}
@keyframes bgMove{0%{background-position:left;}100%{background-position:right;}}
header{background:#2c3e50;color:white;padding:15px;text-align:center;}
.cover{
    width:100%;
    height:250px;
    background:url("https://images.unsplash.com/photo-1612831455541-1f38473f4f7a?auto=format&fit=crop&w=1350&q=80") center/cover no-repeat;
    display:flex;
    align-items:center;
    justify-content:center;
    color:white;
    font-size:40px;
    font-weight:bold;
    text-shadow:2px 2px 10px rgba(0,0,0,0.6);
}
.container{max-width:1200px;margin:auto;padding:20px;}
.products{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:20px;margin-top:20px;}
.card{background:white;padding:10px;border-radius:10px;box-shadow:0 3px 10px rgba(0,0,0,.3);}
.card img{width:100%;height:180px;object-fit:cover;border-radius:6px;}
.price{font-size:18px;color:#27ae60;font-weight:bold;}
.old{text-decoration:line-through;color:red;}
button{padding:8px;margin-top:5px;border:none;border-radius:6px;width:100%;background:#27ae60;color:white;cursor:pointer;}
button.view{background:#3498db;}
form{display:flex;flex-direction:column;gap:10px;margin-top:10px;}
form input, form textarea{padding:8px;border-radius:6px;border:1px solid #ccc;width:100%;}
form button{width:100%;background:#27ae60;color:white;border:none;padding:8px;border-radius:6px;cursor:pointer;}
</style>
</head>

<body>

<header>
<h1>GM Store</h1>
</header>

<div class="cover">Shop Our Products</div>

<div class="container">
<h2>Products</h2>
<div id="productList" class="products"></div>
</div>

<script>

// Load products
let products = JSON.parse(localStorage.getItem("products")) || [];

function renderProducts(){
    let list = document.getElementById("productList");
    list.innerHTML = "";
    products.forEach((p,i)=>{
        let final = (p.price - (p.price*p.discount/100)).toFixed(0);
        let card = document.createElement("div");
        card.className = "card";
        card.innerHTML = `
            <img src="${p.images[0]}">
            <h3>${p.name}</h3>
            <p>${p.description}</p>
            <div>Category: ${p.category}</div>
            <div class="old">PKR ${p.price}</div>
            <div class="price">PKR ${final}</div>
            <div>Stock: ${p.stock}</div>
            <button class="view" onclick="openOrderForm(${i})">Order Now</button>
            <button class="view" onclick="viewProductDetail(${i})">View Details</button>
        `;
        list.appendChild(card);
    });
}

// Order Form
function openOrderForm(i){
    let p = products[i];
    Swal.fire({
        title: `Order: ${p.name}`,
        html: `
        <form id="orderForm" action="https://formspree.io/f/xkoqnkze" method="POST" target="_blank">
            <input type="hidden" name="Product" value="${p.name}">
            <input type="text" name="Name" placeholder="Your Name" required>
            <input type="email" name="Email" placeholder="Your Email" required>
            <input type="tel" name="Phone" placeholder="Your Phone" required>
            <textarea name="Message" placeholder="Additional Message"></textarea>
            <button type="submit">Send Order</button>
        </form>
        `,
        showCloseButton:true,
        showConfirmButton:false,
        width:600,
    });
}

// View Details
function viewProductDetail(i){
    let p = products[i];
    let final = (p.price-(p.price*p.discount/100)).toFixed(0);
    let imagesHtml = p.images.map(img => `<img src="${img}" style="width:100%;margin-bottom:5px;border-radius:5px;">`).join('');
    Swal.fire({
        title: `${p.name}`,
        html: `
        ${imagesHtml}
        <p><strong>Description:</strong> ${p.description}</p>
        <p><strong>Category:</strong> ${p.category}</p>
        <p><strong>Price:</strong> PKR ${p.price}</p>
        <p><strong>Discounted Price:</strong> PKR ${final}</p>
        <p><strong>Stock:</strong> ${p.stock}</p>
        <p><strong>WhatsApp:</strong> ${p.whatsapp}</p>
        `,
        width:600,
        showCloseButton:true
    });
}

renderProducts();

</script>

</body>
</html>
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Client Dashboard</title>
</head>
<body>
    <h1>Welcome Client!</h1>
    <p>Yahaan client ki sari information aur links aa sakti hain.</p>
</body>
</html>
